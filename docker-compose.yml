version: "3.8"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bni_cricket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgre123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (optional — for WebSocket pub/sub) ─────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────
  bni_backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgre123}@postgres:5432/bni_cricket
      SYNC_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgre123}@postgres:5432/bni_cricket
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://bnicricket.com}
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs

  # ── Frontend (Nginx + React) ─────────────────────────────────────
  bni_frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_SITE_URL: ${SITE_URL:-https://bnicricket.com}
    restart: unless-stopped
    depends_on:
      - bni_backend
    ports:
      - "80:80"

volumes:
  pgdata:
  media_data:
  logs_data:
