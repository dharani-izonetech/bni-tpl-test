name: Deploy BNI TPL

on:
  push:
    branches:
      - keerthi-vs

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 30m

          script: |
            set -e

            cd /var/www/bni-tpl

            git fetch origin
            git reset --hard origin/keerthi-vs

            cd backend

            source venv/bin/activate
            pip install -r requirements.txt

            systemctl restart bni-tpl.service