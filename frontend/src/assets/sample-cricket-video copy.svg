<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Sample cricket video animation</title>
  <desc id="desc">Animated cricket ball and tournament highlight background.</desc>
  <rect width="960" height="540" fill="#fff8f0"/>
  <rect y="380" width="960" height="160" fill="#f7e7ae"/>
  <g opacity="0.18">
    <circle cx="170" cy="430" r="110" fill="#d4af37"/>
    <circle cx="790" cy="130" r="140" fill="#d4af37"/>
  </g>
  <text x="72" y="120" fill="#1f1b13" font-family="Arial, sans-serif" font-size="38" font-weight="700">BNI - TPL 2026</text>
  <text x="72" y="166" fill="#735c00" font-family="Arial, sans-serif" font-size="24" font-weight="700">Sample Match Highlight</text>
  <g transform="translate(92 282)" fill="#735c00">
    <path d="M52 12c15 0 27 12 27 27S67 66 52 66 25 54 25 39 37 12 52 12z"/>
    <path d="M46 74h18l16 94H65l-8-42-19 42H22l26-54z"/>
    <path d="M90 42l19 16-54 62-13-10z"/>
    <rect x="106" y="-10" width="16" height="108" rx="8" transform="rotate(38 114 44)"/>
  </g>
  <g>
    <path d="M650 250 C720 206 806 196 884 214" fill="none" stroke="#ba1a1a" stroke-width="14" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 260;260 0;0 260" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <circle cx="670" cy="244" r="28" fill="#ba1a1a" stroke="#d4af37" stroke-width="8">
      <animate attributeName="cx" values="650;870;650" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;210;250" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M654 232c17 9 31 8 46-4" fill="none" stroke="#fff8f0" stroke-width="5" stroke-linecap="round">
      <animate attributeName="d" values="M654 232c17 9 31 8 46-4;M850 199c12 17 22 22 38 22;M654 232c17 9 31 8 46-4" dur="2.4s" repeatCount="indefinite"/>
    </path>
  </g>
  <rect x="72" y="468" width="816" height="12" rx="6" fill="#e1d9cc"/>
  <rect x="72" y="468" width="180" height="12" rx="6" fill="#735c00">
    <animate attributeName="width" values="80;816;80" dur="4s" repeatCount="indefinite"/>
  </rect>
  <text x="72" y="430" fill="#1f1b13" font-family="Arial, sans-serif" font-size="22" font-weight="700">Video preview running</text>
</svg>
